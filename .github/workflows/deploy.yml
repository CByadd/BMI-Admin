name: Deploy BMI-Admin

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Admin to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build Admin Vite App
        env:
          VITE_API_URL:     https://api.well2day.in
          VITE_SOCKET_URL:  https://api.well2day.in
          VITE_SOCKET_PATH: /socket.io
          VITE_APP_NAME:    "Well2Day Admin"
          VITE_ENVIRONMENT: production
        run: |
          npm ci
          npm run build

      - name: Deploy dist to VPS via rsync
        uses: easingthemes/ssh-deploy@v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS:            "-avz --delete"
          SOURCE:          "dist/"
          REMOTE_HOST:     ${{ secrets.VPS_HOST }}
          REMOTE_USER:     ${{ secrets.VPS_USER }}
          TARGET:          "/var/www/bmi-admin/dist"
          EXCLUDE:         ".git/, .github/"

      - name: Fix permissions & reload NGINX
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            chown -R www-data:www-data /var/www/bmi-admin/dist
            nginx -t && systemctl reload nginx
            echo "Admin deployed and NGINX reloaded at $(date)"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::BMI-Admin deploy failed."
